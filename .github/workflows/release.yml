name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Tag to create release for (e.g., v1.2.3)"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

env:
  DEFAULT_PYTHON: "3.13.4"

jobs:
  test:
    uses: ./.github/workflows/tests.yml

  validate:
    uses: ./.github/workflows/validate.yml

  release:
    runs-on: ubuntu-latest
    needs: [test, validate]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if echo "$VERSION" | grep -qE '(a|b|rc|alpha|beta|dev)[0-9]*$'; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract tag annotation
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          body=$(git tag -l --format='%(contents)' "$VERSION" | sed '/^-----BEGIN/,/^-----END/d')
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create ZIP for HACS
        run: |
          cd custom_components
          zip -r ../simple_inventory.zip simple_inventory/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          draft: true
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          files: simple_inventory.zip
